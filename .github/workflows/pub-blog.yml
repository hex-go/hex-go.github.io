name: Publish Blog
run-name: ${{ github.actor }} is Publish Blog by GitHub Actions 🚀
on:
  # workflow_dispatch:
  push:
    branches:
    - hugo-src
jobs:
  Deploy-GitHub-Page:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true
        fetch-depth: 0

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: '0.110.0'
        extended: true

    - name: Build Hugo
      run:  hugo --minify --gc --cleanDestinationDir

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GH_TOKEN }}
        publish_dir: ./public
        commit_message: ${{ github.event.head_commit.message }}